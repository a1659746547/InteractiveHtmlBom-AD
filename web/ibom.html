<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive BOM for KiCAD</title>
  <style type="text/css">
///CSS///
///USERCSS///
  </style>
  <script type="text/javascript" >
///////////////////////////////////////////////
///SPLITJS///
///////////////////////////////////////////////

///////////////////////////////////////////////
///LZ-STRING///
///////////////////////////////////////////////

///////////////////////////////////////////////
///POINTER_EVENTS_POLYFILL///
///////////////////////////////////////////////

///////////////////////////////////////////////
///CONFIG///
///////////////////////////////////////////////

///////////////////////////////////////////////
///PCBDATA///
///////////////////////////////////////////////

///////////////////////////////////////////////
///UTILJS///
///////////////////////////////////////////////

///////////////////////////////////////////////
///RENDERJS///
///////////////////////////////////////////////

///////////////////////////////////////////////
///IBOMJS///
///////////////////////////////////////////////

///////////////////////////////////////////////
///USERJS///
///////////////////////////////////////////////
  </script>
</head>

<body>
///USERHEADER///
<div id="startupOverlay" class="startup-overlay" aria-hidden="true">
  <div class="startup-overlay-bg"></div>
  <div class="startup-overlay-grid"></div>
  <div class="startup-blackhole"></div>
  <div class="startup-overlay-content">
    <div class="startup-badge">InteractiveHtmlBom</div>
    <h1 id="startupTitle" class="startup-title">Loading Board View</h1>
    <p id="startupSubtitle" class="startup-subtitle">Preparing interactive BOM and board rendering</p>
  </div>
</div>
<div id="topmostdiv" class="topmostdiv">
  <div id="top">
    <div style="float: right; height: 100%;">
      <div class="hideonprint menu" style="float: right; top: 8px;">
        <button class="menubtn"></button>
        <div class="menu-content">
          <label class="menu-label menu-label-top menu-label-flex">
            <span data-i18n="theme">Theme</span>
            <select id="themeSelect" class="menu-select" onchange="setTheme(this.value)">
              <option value="light" data-i18n="theme_light">Light</option>
              <option value="dark" data-i18n="theme_dark">Dark</option>
              <option value="apple" data-i18n="theme_apple">Apple</option>
              <option value="blue" data-i18n="theme_blue">Blue Gray</option>
              <option value="green" data-i18n="theme_green">Eye Care Green</option>
            </select>
          </label>
          <label class="menu-label menu-label-top menu-label-lang">
            <div class="menu-label-lang-head">
              <span data-i18n="language">Language</span>
            </div>
            <input id="langSearch" class="menu-lang-search" type="text" placeholder="Search" data-i18n-placeholder="language_search"
                   oninput="filterLanguageOptions(this.value)">
            <select id="langSelect" class="menu-select menu-select-full" onchange="setLanguage(this.value)">
              <option value="en" data-i18n="lang_en">English</option>
              <option value="zh" data-i18n="lang_zh">中文</option>
              <option value="ja" data-i18n="lang_ja">日本語</option>
              <option value="ko" data-i18n="lang_ko">한국어</option>
            </select>
          </label>
          <div class="menu-grid menu-grid-top">
            <label class="menu-label">
              <input id="darkmodeCheckbox" type="checkbox" onchange="setDarkMode(this.checked)">
              <span data-i18n="dark_mode">Dark mode</span>
            </label>
            <label class="menu-label">
              <input id="fullscreenCheckbox" type="checkbox" onchange="setFullscreen(this.checked)">
              <span data-i18n="full_screen">Full Screen</span>
            </label>
            <label class="menu-label">
              <input id="fabricationCheckbox" type="checkbox" checked onchange="fabricationVisible(this.checked)">
              <span data-i18n="fab_layer">Fab layer</span>
            </label>
            <label class="menu-label">
              <input id="silkscreenCheckbox" type="checkbox" checked onchange="silkscreenVisible(this.checked)">
              <span data-i18n="silkscreen">Silkscreen</span>
            </label>
            <label class="menu-label">
              <input id="referencesCheckbox" type="checkbox" checked onchange="referencesVisible(this.checked)">
              <span data-i18n="references">References</span>
            </label>
            <label class="menu-label">
              <input id="valuesCheckbox" type="checkbox" checked onchange="valuesVisible(this.checked)">
              <span data-i18n="values">Values</span>
            </label>
            <label class="menu-label">
              <input id="padsCheckbox" type="checkbox" checked onchange="padsVisible(this.checked)">
              <span data-i18n="pads">Pads</span>
            </label>
            <label class="menu-label">
              <input id="dnpOutlineCheckbox" type="checkbox" checked onchange="dnpOutline(this.checked)">
              <span data-i18n="dnp_outlined">DNP outlined</span>
            </label>
            <label class="menu-label">
              <input id="highlightpin1Checkbox" type="checkbox" onchange="setHighlightPin1(this.checked)">
              <span data-i18n="highlight_pin1">Highlight first pin</span>
            </label>
            <label class="menu-label">
              <input id="dragCheckbox" type="checkbox" checked onchange="setRedrawOnDrag(this.checked)">
              <span data-i18n="continuous_redraw">Continuous redraw on drag</span>
            </label>
          </div>
          <div id="tracksAndZonesCheckboxes" class="menu-grid menu-grid-bottom">
            <label class="menu-label">
              <input id="tracksCheckbox" type="checkbox" checked onchange="tracksVisible(this.checked)">
              <span data-i18n="tracks">Tracks</span>
            </label>
            <label class="menu-label">
              <input id="zonesCheckbox" type="checkbox" checked onchange="zonesVisible(this.checked)">
              <span data-i18n="zones">Zones</span>
            </label>
          </div>
          <label class="menu-label">
            <span data-i18n="board_rotation">Board rotation</span>
            <span style="float: right"><span id="rotationDegree">0</span>&#176;</span>
            <input id="boardRotation" type="range" min="-36" max="36" value="0" class="slider" oninput="setBoardRotation(this.value)">
          </label>
          <label class="menu-label">
            <div style="margin-left: 5px" data-i18n="bom_checkboxes">Bom checkboxes</div>
            <input id="bomCheckboxes" class="menu-textbox" type=text
                   oninput="setBomCheckboxes(this.value)">
          </label>
          <label class="menu-label">
            <div style="margin-left: 5px" data-i18n="darken_when_checked">Darken when checked</div>
            <div id="darkenWhenCheckedContainer"></div>
          </label>
          <label class="menu-label">
            <span class="shameless-plug">
              <span data-i18n="created_using">Created using</span>
              <a id="github-link" target="blank" href="https://github.com/openscopeproject/InteractiveHtmlBom">InteractiveHtmlBom</a>
            </span>
          </label>
        </div>
      </div>
      <div class="button-container hideonprint"
           style="float: right; position: relative; top: 8px">
        <button id="fl-btn" class="left-most-button" onclick="changeCanvasLayout('F')"
                title="Front only" data-i18n-title="front_only">F
        </button>
        <button id="fb-btn" class="middle-button" onclick="changeCanvasLayout('FB')"
                title="Front and Back" data-i18n-title="front_and_back">FB
        </button>
        <button id="bl-btn" class="right-most-button" onclick="changeCanvasLayout('B')"
                title="Back only" data-i18n-title="back_only">B
        </button>
      </div>
      <div class="button-container hideonprint"
           style="float: right; position: relative; top: 8px">
        <button id="bom-btn" class="left-most-button" onclick="changeBomLayout('bom-only')"
                title="BOM only" data-i18n-title="bom_only"></button>
        <button id="lr-btn" class="middle-button" onclick="changeBomLayout('left-right')"
                title="BOM left, drawings right" data-i18n-title="bom_left_right"></button>
        <button id="tb-btn" class="right-most-button" onclick="changeBomLayout('top-bottom')"
                title="BOM top, drawings bot" data-i18n-title="bom_top_bottom"></button>
      </div>
      <div class="button-container hideonprint"
           style="float: right; position: relative; top: 8px">
        <button id="bom-grouped-btn" class="left-most-button" onclick="changeBomMode('grouped')"
                title="Grouped BOM" data-i18n-title="grouped_bom"></button>
        <button id="bom-ungrouped-btn" class="middle-button" onclick="changeBomMode('ungrouped')"
                title="Ungrouped BOM" data-i18n-title="ungrouped_bom"></button>
        <button id="bom-netlist-btn" class="right-most-button" onclick="changeBomMode('netlist')"
                title="Netlist" data-i18n-title="netlist"></button>
      </div>
      <div class="hideonprint menu" style="float: right; top: 8px;">
        <button class="statsbtn"></button>
        <div class="menu-content">
          <table class="stats">
            <tbody>
              <tr>
                <td width="40%" data-i18n="board_stats">Board stats</td>
                <td data-i18n="front">Front</td>
                <td data-i18n="back">Back</td>
                <td data-i18n="total">Total</td>
              </tr>
              <tr>
                <td data-i18n="components">Components</td>
                <td id="stats-components-front">~</td>
                <td id="stats-components-back">~</td>
                <td id="stats-components-total">~</td>
              </tr>
              <tr>
                <td data-i18n="groups">Groups</td>
                <td id="stats-groups-front">~</td>
                <td id="stats-groups-back">~</td>
                <td id="stats-groups-total">~</td>
              </tr>
              <tr>
                <td data-i18n="smd_pads">SMD pads</td>
                <td id="stats-smd-pads-front">~</td>
                <td id="stats-smd-pads-back">~</td>
                <td id="stats-smd-pads-total">~</td>
              </tr>
              <tr>
                <td data-i18n="th_pads">TH pads</td>
                <td colspan=3 id="stats-th-pads">~</td>
              </tr>
            </tbody>
          </table>
          <table class="stats">
            <col width="40%"/><col />
            <tbody id="checkbox-stats">
              <tr>
                <td colspan=2 style="border-top: 0" data-i18n="checkboxes_label">Checkboxes</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="hideonprint menu" style="float: right; top: 8px;">
        <button class="iobtn"></button>
        <div class="menu-content">
          <div class="menu-label menu-label-top">
            <div style="margin-left: 5px;" data-i18n="save_board_image">Save board image</div>
            <div class="flexbox">
              <input id="render-save-width" class="menu-textbox" type="text" value="1000" placeholder="Width" data-i18n-placeholder="width"
                  style="flex-grow: 1; width: 50px;" oninput="validateSaveImgDimension(this)">
              <span>X</span>
              <input id="render-save-height" class="menu-textbox" type="text" value="1000" placeholder="Height" data-i18n-placeholder="height"
                  style="flex-grow: 1; width: 50px;" oninput="validateSaveImgDimension(this)">
            </div>
            <label>
              <input id="render-save-transparent" type="checkbox">
              <span data-i18n="transparent_background">Transparent background</span>
            </label>
            <div class="flexbox">
              <button class="savebtn" onclick="saveImage('F')" data-i18n="front">Front</button>
              <button class="savebtn" onclick="saveImage('B')" data-i18n="back">Back</button>
            </div>
          </div>
          <div class="menu-label">
            <span style="margin-left: 5px;" data-i18n="config_checkbox_state">Config and checkbox state</span>
            <div class="flexbox">
              <button class="savebtn" onclick="saveSettings()" data-i18n="export">Export</button>
              <button class="savebtn" onclick="loadSettings()" data-i18n="import">Import</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="fileinfodiv" style="overflow: auto;">
      <table class="fileinfo">
        <tbody>
          <tr>
            <td id="title" class="title" style="width: 70%">
              <span data-i18n="title">Title</span>
            </td>
            <td id="revision" class="title" style="width: 30%">
              <span data-i18n="revision">Revision</span>
            </td>
          </tr>
          <tr>
            <td id="company">
              <span data-i18n="company">Company</span>
            </td>
            <td id="filedate">
              <span data-i18n="date">Date</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="bot" class="split" style="height: calc(100% - 80px)">
    <div id="bomdiv" class="split split-horizontal">
      <div style="width: 100%">
        <input id="reflookup" class="textbox searchbox reflookup hideonprint" type="text" placeholder="Ref lookup" data-i18n-placeholder="ref_lookup"
               oninput="updateRefLookup(this.value)">
        <input id="filter" class="textbox searchbox filter hideonprint" type="text" placeholder="Filter" data-i18n-placeholder="filter"
               oninput="updateFilter(this.value)">
        <div class="button-container hideonprint" style="float: left; margin: 0;">
          <button id="copy" title="Copy bom table to clipboard" data-i18n-title="copy_bom"
               onclick="copyToClipboard()"></button>
        </div>
      </div>
      <div id="dbg"></div>
      <table class="bom">
        <thead id="bomhead">
        </thead>
        <tbody id="bombody">
        </tbody>
      </table>
    </div>
    <div id="canvasdiv" class="split split-horizontal">
      <div id="frontcanvas" class="split" touch-action="none" style="overflow: hidden">
        <div style="position: relative; width: 100%; height: 100%;">
          <canvas id="F_bg" style="position: absolute; left: 0; top: 0; z-index: 0;"></canvas>
          <canvas id="F_fab" style="position: absolute; left: 0; top: 0; z-index: 1;"></canvas>
          <canvas id="F_slk" style="position: absolute; left: 0; top: 0; z-index: 2;"></canvas>
          <canvas id="F_hl" style="position: absolute; left: 0; top: 0; z-index: 3;"></canvas>
        </div>
      </div>
      <div id="backcanvas" class="split" touch-action="none" style="overflow: hidden">
        <div style="position: relative; width: 100%; height: 100%;">
          <canvas id="B_bg" style="position: absolute; left: 0; top: 0; z-index: 0;"></canvas>
          <canvas id="B_fab" style="position: absolute; left: 0; top: 0; z-index: 1;"></canvas>
          <canvas id="B_slk" style="position: absolute; left: 0; top: 0; z-index: 2;"></canvas>
          <canvas id="B_hl" style="position: absolute; left: 0; top: 0; z-index: 3;"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>
///USERFOOTER///
</body>

</html>
